<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zakázka online – TORKIS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6fb; color: #333; min-height: 100vh; }

    .topbar {
      background: #2196F3;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-logo { font-weight: 700; font-size: 20px; letter-spacing: 1px; }
    .topbar-sep { opacity: 0.4; margin: 0 4px; }
    .topbar-sub { font-size: 14px; opacity: 0.85; }

    .container { max-width: 640px; margin: 0 auto; padding: 16px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .spz-badge {
      background: #2196F3;
      color: white;
      font-size: 18px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      letter-spacing: 2px;
      display: inline-block;
    }
    .vehicle-name { font-size: 20px; font-weight: 700; margin-top: 10px; color: #222; }
    .vehicle-sub  { font-size: 13px; color: #888; margin-top: 3px; }

    .vehicle-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 14px;
      margin-top: 4px;
    }
    .vg-label { font-size: 12px; color: #999; white-space: nowrap; padding-top: 1px; }
    .vg-value { font-size: 13px; color: #222; font-weight: 500; word-break: break-all; }

    .info-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: #666;
      margin-top: 7px;
    }
    .info-row b { color: #333; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 12px 0; }

    .status-row { display: flex; align-items: center; gap: 12px; }
    .status-label { font-size: 14px; color: #666; }
    .status-chip {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 13px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 14px;
    }

    /* Chat bubbles */
    .chat-container { display: flex; flex-direction: column; gap: 10px; }

    .chat-row {
      display: flex;
      flex-direction: column;
    }
    .chat-row.servis  { align-items: flex-start; }
    .chat-row.zakaznik { align-items: flex-end; }

    .chat-meta {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .chat-bubble {
      max-width: 82%;
      border-radius: 14px;
      padding: 10px 14px;
      word-break: break-word;
    }
    .chat-bubble.servis {
      background: #f0f4ff;
      border: 1px solid #dce4f8;
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.zakaznik {
      background: #2196F3;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble .message-text {
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-bubble.zakaznik .message-text { color: white; }
    .chat-bubble.servis   .message-text { color: #333; }

    .photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .photos img {
      width: 72px; height: 72px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .photos img:hover { opacity: 0.85; }

    /* Nacenění card */
    .naceneni-card {
      background: #f1fbf5;
      border: 1.5px solid #a5d6a7;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 14px;
      max-width: 90%;
    }
    .naceneni-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #2e7d32;
      margin-bottom: 10px;
    }
    .naceneni-castka {
      font-size: 26px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .naceneni-popis {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .naceneni-stav {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .naceneni-stav.cekajici { background: #fff3e0; color: #e65100; }
    .naceneni-stav.schvaleno { background: #e8f5e9; color: #2e7d32; }
    .naceneni-stav.zamitnuto { background: #ffebee; color: #c62828; }
    .naceneni-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .btn-schvalit {
      flex: 1;
      background: #4caf50;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-schvalit:hover { background: #388e3c; }
    .btn-zamitnout {
      flex: 1;
      background: white;
      color: #c62828;
      border: 1.5px solid #ef9a9a;
      padding: 11px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-zamitnout:hover { background: #ffebee; }

    /* Reply area */
    .reply-area {
      border-top: 1px solid #f0f0f0;
      padding-top: 14px;
      margin-top: 6px;
      display: none;
    }
    .reply-input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      color: #333;
    }
    .reply-input:focus { border-color: #2196F3; }
    .reply-btn {
      background: #2196F3;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
    }
    .reply-btn:hover:not(:disabled) { background: #1976D2; }
    .reply-btn:disabled { opacity: 0.55; cursor: default; }

    .empty-msgs { text-align: center; padding: 28px 16px; color: #bbb; font-size: 14px; }

    .loading { text-align: center; padding: 70px 20px; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #e0e0e0;
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #aaa; font-size: 14px; }

    .error-state { text-align: center; padding: 60px 20px; display: none; }
    .error-icon { font-size: 52px; }
    .error-msg { font-size: 17px; color: #666; margin-top: 14px; }

    #content { display: none; }

    .footer { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; padding-bottom: 28px; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }
    .lb-close {
      position: absolute;
      top: 14px; right: 18px;
      color: white; font-size: 30px;
      cursor: pointer; background: none; border: none;
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">TORKIS</span>
  <span class="topbar-sep">|</span>
  <span class="topbar-sub">Zákaznický portál</span>
</div>

<div class="container">

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Načítám zakázku...</p>
  </div>

  <div class="error-state" id="error-state">
    <div class="error-icon">🔍</div>
    <div class="error-msg" id="error-msg">Zakázka nenalezena.</div>
  </div>

  <div id="content">
    <div class="card" id="vehicle-card"></div>
    <div class="card" id="status-card"></div>
    <div class="card" id="messages-card">
      <div class="section-title">Komunikace</div>
      <div id="messages-list"></div>
      <div class="reply-area" id="reply-area">
        <textarea class="reply-input" id="reply-input" rows="3" placeholder="Napište zprávu servisu..."></textarea>
        <button class="reply-btn" id="reply-btn">Odeslat zprávu</button>
      </div>
    </div>
    <div class="footer">Powered by TORKIS – servisní software</div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">&#x2715;</button>
  <img id="lb-img" src="" alt="">
</div>

<script type="module">
  import { initializeApp }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, collection, query, where, getDocs, onSnapshot, orderBy, limit, addDoc, updateDoc, doc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
  import { getAuth, signInAnonymously }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            'AIzaSyDUQflnV2GaXGZVlO59LGy7zNH27AzdMtg',
    authDomain:        'visto-51cb7.firebaseapp.com',
    projectId:         'visto-51cb7',
    storageBucket:     'visto-51cb7.firebasestorage.app',
    messagingSenderId: '283147372379',
    appId:             '1:283147372379:web:4bed6764149d487be67c7e',
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const auth = getAuth(app);

  // Token z URL: /zakazka/TOKEN
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const token = pathParts[pathParts.length - 1];

  // ── helpers ───────────────────────────────────────────────────

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }

  function formatDate(ts) {
    if (!ts) return '–';
    const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
    return d.toLocaleDateString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric' })
         + ' ' + d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
  }

  function stavStyle(stav) {
    const map = {
      'Přijato':      { bg: '#e3f2fd', color: '#1565c0' },
      'K nacenění':   { bg: '#fff3e0', color: '#e65100' },
      'Čeká na díly': { bg: '#fff8e1', color: '#f57f17' },
      'V opravě':     { bg: '#e8f5e9', color: '#2e7d32' },
      'Hotovo':       { bg: '#e8f5e9', color: '#1b5e20' },
      'Ukončeno':     { bg: '#f5f5f5', color: '#616161' },
      'Stornováno':   { bg: '#ffebee', color: '#c62828' },
    };
    return map[stav] || { bg: '#eceff1', color: '#546e7a' };
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── render ────────────────────────────────────────────────────

  function renderVehicleCard(data) {
    const spz        = escHtml(data.spz || '');
    const znacka     = escHtml(data.znacka || '');
    const model      = escHtml(data.model || '');
    const vin        = escHtml(data.vin || '');
    const rok        = escHtml(data.rok_vyroby || '');
    const motorizace = escHtml(data.motorizace || '');
    const palivo     = escHtml(data.palivo_typ || '');
    const prevodovka = escHtml(data.prevodovka || '');
    const zakazkaId  = escHtml(data.cislo_zakazky || '');
    const prijeto    = formatDate(data.cas_prijeti);

    const z          = data.zakaznik || {};
    const jmeno      = escHtml(z.jmeno || '');
    const telefon    = escHtml(z.telefon || '');
    const email      = escHtml(z.email || '');
    const adresa     = escHtml(z.adresa || '');

    const zakaznikRows = [
      jmeno   ? `<div class="info-row" style="font-size:15px;font-weight:600;color:#222;">👤 ${jmeno}</div>` : '',
      adresa  ? `<div class="info-row">📍 <span>${adresa}</span></div>` : '',
      telefon ? `<div class="info-row">📞 <span>${telefon}</span></div>` : '',
      email   ? `<div class="info-row">✉️ <span>${email}</span></div>` : '',
    ].filter(Boolean).join('');

    const detailRows = [
      vin        ? `<span class="vg-label">VIN</span><span class="vg-value">${vin}</span>` : '',
      rok        ? `<span class="vg-label">Rok výroby</span><span class="vg-value">${rok}</span>` : '',
      motorizace ? `<span class="vg-label">Motorizace</span><span class="vg-value">${motorizace}</span>` : '',
      palivo     ? `<span class="vg-label">Palivo</span><span class="vg-value">${palivo}</span>` : '',
      prevodovka ? `<span class="vg-label">Převodovka</span><span class="vg-value">${prevodovka}</span>` : '',
    ].filter(Boolean).join('');

    document.getElementById('vehicle-card').innerHTML = `
      ${zakaznikRows}
      <hr class="divider">
      <span class="spz-badge">${spz || '–'}</span>
      ${(znacka || model) ? `<div class="vehicle-name">${znacka} ${model}</div>` : ''}
      ${detailRows ? `<hr class="divider"><div class="vehicle-grid">${detailRows}</div>` : ''}
      <hr class="divider">
      ${zakazkaId ? `<div class="info-row">📋 <span>Zakázka: <b>${zakazkaId}</b></span></div>` : ''}
      <div class="info-row">🕐 <span>Přijato: ${prijeto}</span></div>
    `;
  }

  function renderStatusCard(stav) {
    const s = stavStyle(stav);
    document.getElementById('status-card').innerHTML = `
      <div class="status-row">
        <span class="status-label">Aktuální stav:</span>
        <span class="status-chip" style="background:${s.bg};color:${s.color};">${escHtml(stav)}</span>
      </div>
    `;
  }

  let _rozhodniNaceneni = null;

  function renderNaceneniMsg(d) {
    const stav    = d.stav_schvaleni || 'cekajici';
    const castka  = d.castka || 0;
    const text    = escHtml(d.text || '').replace(/\n/g, '<br>');
    const autor   = escHtml(d.autor || 'Servis');
    const time    = formatDate(d.cas);
    const castkaFmt = new Intl.NumberFormat('cs-CZ', {
      style: 'currency', currency: 'CZK', minimumFractionDigits: 2
    }).format(castka);
    const stavMap = {
      cekajici: '<span class="naceneni-stav cekajici">⏳ Čeká na schválení</span>',
      schvaleno: '<span class="naceneni-stav schvaleno">✓ Schváleno</span>',
      zamitnuto: '<span class="naceneni-stav zamitnuto">✗ Zamítnuto</span>',
    };
    const actionsHtml = stav === 'cekajici' ? `
      <div class="naceneni-actions">
        <button class="btn-schvalit" data-msg-id="${escHtml(d._id)}">✓ Schválit</button>
        <button class="btn-zamitnout" data-msg-id="${escHtml(d._id)}">✗ Zamítnout</button>
      </div>` : '';
    return `
      <div class="chat-row servis">
        <div class="chat-meta">${autor} · ${time}</div>
        <div class="naceneni-card">
          <div class="naceneni-header">💰 Nacenění opravy</div>
          <div class="naceneni-castka">${castkaFmt}</div>
          ${text ? `<div class="naceneni-popis">${text}</div>` : ''}
          ${stavMap[stav] || ''}
          ${actionsHtml}
        </div>
      </div>`;
  }

  function renderMessages(docs) {
    const list = document.getElementById('messages-list');
    if (!docs.length) {
      list.innerHTML = '<div class="empty-msgs">💬<br><br>Zatím zde nejsou žádné zprávy.</div>';
      return;
    }
    list.innerHTML = '<div class="chat-container">' + docs.map(d => {
      if (d.typ === 'naceneni') return renderNaceneniMsg(d);
      const isZakaznik = d.from_zakaznik === true || d.autor === 'Zákazník';
      const side  = isZakaznik ? 'zakaznik' : 'servis';
      const autor = escHtml(d.autor || 'Servis');
      const text  = escHtml(d.text || '').replace(/\n/g, '<br>');
      const time  = formatDate(d.cas);
      const urls  = d.foto_urls || [];
      const photos = urls.map(u =>
        `<img src="${escHtml(u)}" alt="foto" data-url="${escHtml(u)}">`
      ).join('');
      return `
        <div class="chat-row ${side}">
          <div class="chat-meta">${autor} · ${time}</div>
          <div class="chat-bubble ${side}">
            <div class="message-text">${text}</div>
            ${urls.length ? `<div class="photos">${photos}</div>` : ''}
          </div>
        </div>`;
    }).join('') + '</div>';

    list.querySelectorAll('.photos img').forEach(img => {
      img.addEventListener('click', () => openLightbox(img.dataset.url));
    });
    list.querySelectorAll('.btn-schvalit').forEach(btn => {
      btn.addEventListener('click', () => _rozhodniNaceneni?.(btn.dataset.msgId, 'schvaleno'));
    });
    list.querySelectorAll('.btn-zamitnout').forEach(btn => {
      btn.addEventListener('click', () => _rozhodniNaceneni?.(btn.dataset.msgId, 'zamitnuto'));
    });
  }

  // ── init ──────────────────────────────────────────────────────

  async function init() {
    if (!token || token === 'zakazka') {
      showError('Neplatný odkaz zakázky.');
      return;
    }

    try {
      await signInAnonymously(auth);

      const q = query(
        collection(db, 'zakazky'),
        where('portal_token', '==', token),
        limit(1)
      );
      const snap = await getDocs(q);

      if (snap.empty) {
        showError('Zakázka nenalezena nebo odkaz je neplatný.');
        return;
      }

      const docRef = snap.docs[0].ref;
      const data   = snap.docs[0].data();
      const docId  = snap.docs[0].id;

      renderVehicleCard(data);
      renderStatusCard(data.stav_zakazky || 'Přijato');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('reply-area').style.display = 'block';

      // Real-time aktualizace stavu
      onSnapshot(docRef, docSnap => {
        if (docSnap.exists()) {
          renderStatusCard(docSnap.data().stav_zakazky || 'Přijato');
        }
      });

      // Schválení / zamítnutí nacenění zákazníkem
      _rozhodniNaceneni = async (msgId, rozhodnuti) => {
        try {
          const msgRef = doc(db, 'zakazky', docId, 'zakaznik_zpravy', msgId);
          await updateDoc(msgRef, { stav_schvaleni: rozhodnuti });
          const stavText = rozhodnuti === 'schvaleno' ? 'schválil' : 'zamítl';
          await addDoc(collection(db, 'zakazky', docId, 'zakaznik_zpravy'), {
            text: `Zákazník ${stavText} nacenění.`,
            foto_urls: [],
            cas: serverTimestamp(),
            autor: zakaznikJmeno,
            from_zakaznik: true,
            odeslan_email: false,
          });
        } catch (e) {
          alert('Chyba: ' + e.message);
        }
      };

      // Real-time zprávy
      const msgsQ = query(
        collection(db, 'zakazky', docId, 'zakaznik_zpravy'),
        orderBy('cas', 'asc')
      );
      onSnapshot(msgsQ, msgsSnap => {
        renderMessages(msgsSnap.docs.map(d => ({ ...d.data(), _id: d.id })));
      });

      // Odeslání odpovědi zákazníkem
      const zakaznikJmeno = data.zakaznik?.jmeno || 'Zákazník';
      const replyInput = document.getElementById('reply-input');
      const replyBtn   = document.getElementById('reply-btn');

      replyBtn.addEventListener('click', async () => {
        const text = replyInput.value.trim();
        if (!text) return;
        replyBtn.disabled = true;
        replyBtn.textContent = 'Odesílám...';
        try {
          await addDoc(collection(db, 'zakazky', docId, 'zakaznik_zpravy'), {
            text,
            foto_urls: [],
            cas: serverTimestamp(),
            autor: zakaznikJmeno,
            from_zakaznik: true,
            odeslan_email: false,
          });
          replyInput.value = '';
        } catch (e) {
          alert('Chyba při odesílání: ' + e.message);
        } finally {
          replyBtn.disabled = false;
          replyBtn.textContent = 'Odeslat zprávu';
        }
      });

      // Odeslání přes Enter (Shift+Enter = nový řádek)
      replyInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          replyBtn.click();
        }
      });

    } catch (e) {
      showError('Chyba při načítání: ' + e.message);
    }
  }

  init();
</script>

<script>
  // Lightbox (non-module, aby byl dostupný globálně)
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');

  function openLightbox(url) {
    lbImg.src = url;
    lightbox.classList.add('open');
  }

  document.getElementById('lb-close').addEventListener('click', () => {
    lightbox.classList.remove('open');
    lbImg.src = '';
  });
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) {
      lightbox.classList.remove('open');
      lbImg.src = '';
    }
  });
</script>

</body>
</html>

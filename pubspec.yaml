name: torkis
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.2
  image_picker: ^1.1.2
  http: ^1.2.2
  signature: ^5.5.0
  google_mlkit_text_recognition: ^0.15.0
  flutter_barcode_scanner: ^2.0.0
  shared_preferences: ^2.5.3
  table_calendar: ^3.1.3
  firebase_crashlytics: ^4.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Snížili jsme verzi lints na 4.0.0, která funguje s Dart SDK 3.5.x
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
workflows:
  ios-adhoc:
    name: iOS Ad Hoc
    max_build_duration: 60
    integrations:
      app_store_connect: CodeMagic
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: "com.jansvihalek.torkis"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Set up signing
        script: |
          set -e
          keychain initialize
          # Vygenerujeme RSA private key v PEM formátu pro Distribution certifikát.
          # Codemagic CLI vyžaduje @ prefix pro čtení obsahu klíče ze souboru.
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/cert_key.pem -q -N ""
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/cert_key.pem \
            --save
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Build IPA
        script: xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jan.svihalek00@gmail.com
        notify:
          success: true
          failure: true
